<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 상세 | Heritage Namhae</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="../static/js/auth.js" th:src="@{/js/auth.js}" defer></script>
</head>
<body class="bg-[#f0f7ff] text-[#003366] min-h-screen">
    <header class="bg-white border-b border-[#99c2ff]/30">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="/" th:href="@{/}" class="text-2xl font-black tracking-tight text-[#0066cc]">Heritage Namhae</a>
            <nav class="flex items-center gap-6" aria-label="상단 메뉴">
                <div id="guestMenu" class="items-center gap-6">
                    <a class="material-symbols-outlined text-[#0066cc] duration-200" th:href="@{/login.html}" href="/login.html" aria-label="로그인">person</a>
                    <a class="material-symbols-outlined text-[#0066cc] duration-200" th:href="@{/register.html}" href="/register.html" aria-label="회원가입">person_add</a>
                </div>
                <div id="memberMenu" class="items-center gap-6" style="display: none;">
                    <a href="/cart/view" th:href="@{/cart/view}" class="relative inline-flex items-center justify-center text-[#0066cc] duration-200" aria-label="장바구니">
                        <span class="material-symbols-outlined">shopping_bag</span>
                        <span id="cart-count-badge" class="hidden absolute -top-2 -right-3 min-w-[1.35rem] h-5 px-1 rounded-full bg-[#0066cc] text-white text-[10px] font-extrabold leading-5 text-center shadow-md shadow-[#0066cc]/30 border border-white">0</span>
                    </a>
                    <a class="material-symbols-outlined text-[#0066cc] duration-200" id="member-dashboard-link" th:href="@{/member}" href="/member" aria-label="회원페이지">person</a>
                    <a class="material-symbols-outlined text-[#0066cc] duration-200 cursor-pointer" id="logoutBtn" href="#" aria-label="로그아웃">person_remove</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-10">
        <section id="status-panel" class="mb-8 rounded-2xl border bg-white p-6 shadow-sm"></section>

        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 rounded-2xl border bg-white p-6 shadow-sm">
                <h1 class="text-2xl font-extrabold mb-6">주문 상세</h1>
                <div id="order-info" class="space-y-3 text-sm"></div>
                <div class="mt-8">
                    <h2 class="text-lg font-bold mb-4">주문 상품</h2>
                    <div id="order-items" class="divide-y divide-gray-100"></div>
                </div>
            </div>

            <aside class="rounded-2xl border bg-white p-6 shadow-sm h-fit">
                <h2 class="text-lg font-bold mb-4">결제 금액</h2>
                <div id="payment-summary" class="space-y-3 text-sm"></div>
                <a href="/" class="mt-6 block w-full rounded-full bg-[#0066cc] px-5 py-3 text-center font-bold text-white">계속 쇼핑하기</a>
            </aside>
        </section>
    </main>

    <script>
        function money(value) {
            return '₩' + (Number(value) || 0).toLocaleString('ko-KR');
        }

        function escapeHtml(value) {
            return String(value || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        const params = new URLSearchParams(window.location.search);
        const status = params.get('status');
        const order = JSON.parse(localStorage.getItem('namhae_order_v1') || 'null');
        const statusPanel = document.getElementById('status-panel');
        const orderInfo = document.getElementById('order-info');
        const orderItems = document.getElementById('order-items');
        const paymentSummary = document.getElementById('payment-summary');

        if (status === 'success') {
            statusPanel.innerHTML = '<h2 class="text-xl font-extrabold text-[#0066cc]">결제가 완료되었습니다.</h2><p class="mt-2 text-sm text-[#004080]">주문 정보가 정상적으로 저장되었습니다.</p>';
        } else if (status === 'fail') {
            statusPanel.innerHTML = '<h2 class="text-xl font-extrabold text-red-700">결제 처리에 실패했습니다.</h2><p class="mt-2 text-sm text-red-600">장바구니에서 다시 시도해주세요.</p>';
        } else {
            statusPanel.innerHTML = '<h2 class="text-xl font-extrabold">주문 정보를 확인합니다.</h2>';
        }

        if (!order || !Array.isArray(order.items) || order.items.length === 0) {
            orderInfo.innerHTML = '<p class="text-gray-500">표시할 주문 정보가 없습니다.</p>';
            orderItems.innerHTML = '<p class="py-6 text-gray-500">주문 상품이 없습니다.</p>';
            paymentSummary.innerHTML = '<p class="text-gray-500">결제 금액 정보가 없습니다.</p>';
        } else {
            orderInfo.innerHTML = `
                <p><span class="font-bold">주문번호</span> ${escapeHtml(order.orderNumber)}</p>
                <p><span class="font-bold">주문일시</span> ${escapeHtml(order.orderDate)}</p>
                <p><span class="font-bold">수령인</span> ${escapeHtml(order.buyerName)} ${escapeHtml(order.buyerPhone)}</p>
                <p><span class="font-bold">배송지</span> ${escapeHtml(order.shippingAddress)}</p>
                <p><span class="font-bold">도착 예정</span> ${escapeHtml(order.estimatedArrival)}</p>
            `;

            orderItems.innerHTML = order.items.map((item) => `
                <article class="py-4 flex gap-4">
                    <div class="w-20 h-20 rounded-xl bg-gray-100 overflow-hidden flex-shrink-0">
                        <img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name)}" class="w-full h-full object-cover" onerror="this.style.display='none'">
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold">${escapeHtml(item.name)}</h3>
                        <p class="mt-1 text-sm text-gray-500">수량 ${Number(item.quantity) || 1}개</p>
                        <p class="mt-2 font-bold text-[#0066cc]">${money((Number(item.price) || 0) * (Number(item.quantity) || 1))}</p>
                    </div>
                </article>
            `).join('');

            paymentSummary.innerHTML = `
                <div class="flex justify-between"><span>상품 금액</span><strong>${money(order.totalPrice)}</strong></div>
                <div class="flex justify-between"><span>포인트 할인</span><strong>-${money(order.usedPoints).slice(1)}</strong></div>
                <div class="flex justify-between border-t pt-3 text-lg"><span>최종 결제</span><strong class="text-[#0066cc]">${money(order.finalTotal)}</strong></div>
            `;
        }
    </script>
</body>
</html>
