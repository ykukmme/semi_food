spring:
  datasource:
    # TiDB Cloud 접속 정보는 환경변수로만 (no hardcoded secrets)
    url: ${TIDB_URL}
    username: ${TIDB_USERNAME}
    password: ${TIDB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none       # Flyway가 스키마 관리 — JPA는 관여하지 않음
    defer-datasource-initialization: true  # Flyway 마이그레이션 완료 후 JPA 초기화 보장
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: false   # 수동 FlywayConfig Bean 사용 (Spring Boot 4.x auto-config 우회)

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}   # 배포 시 실제 도메인으로 설정 필수

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.semi: ${LOG_LEVEL:INFO}
    org.flywaydb: ${FLYWAY_LOG_LEVEL:INFO}

jwt:
  secret: ${JWT_SECRET}
  expiry-seconds: ${JWT_EXPIRY_SECONDS:7200}
