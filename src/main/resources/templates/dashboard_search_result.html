<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#44160;&#49353; &#44208;&#44284; | Heritage Namhae</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard_search_result.css">
    <link rel="stylesheet" href="/css/vanilla-utilities.css">
</head>
<body class="min-h-screen text-gray-800">
    <header class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between gap-6">
            <a id="member-dashboard-link" th:href="@{/member}" href="/member" class="inline-flex items-center gap-2 text-sm font-bold text-emerald-700 hover:text-emerald-800 transition-colors">
                <span class="material-symbols-outlined text-[18px]">arrow_back</span>
                &#45824;&#49884;&#48372;&#46300;&#47196; &#46028;&#50500;&#44032;&#44592;
            </a>
            <form id="dashboard-search-form" th:action="@{/dashboard_search_result.html}" action="/dashboard_search_result.html" method="get" class="result-search-form" role="search">
                <span class="material-symbols-outlined result-search-icon">search</span>
                <input
                    id="dashboard-search-input"
                    name="q"
                    type="search"
                    th:value="${query}"
                    placeholder="&#49345;&#54408;, &#53412;&#50892;&#46300; &#44160;&#49353;"
                    class="result-search-input"
                    autocomplete="off">
            </form>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <h1 class="text-3xl font-bold text-gray-900">&#44160;&#49353; &#44208;&#44284;</h1>
        <p class="text-gray-500 mt-3 mb-8">
            <span th:if="${query == null or #strings.isEmpty(query)}">&#44160;&#49353;&#50612;&#47484; &#51077;&#47141;&#54644;&#51452;&#49464;&#50836;.</span>
            <span th:if="${query != null and !#strings.isEmpty(query)}">
                &quot;<strong class="text-gray-900" th:text="${query}">&#53412;&#50892;&#46300;</strong>&quot;
                &#49345;&#54408;&#47749; &#44160;&#49353; &#44208;&#44284;
                <strong class="text-emerald-700" th:text="${products != null ? #lists.size(products) : 0}">0</strong>&#44148;
            </span>
        </p>

        <section th:if="${products != null and !#lists.isEmpty(products)}" class="bg-white rounded-2xl border border-gray-200 shadow-sm">
            <div class="px-6 py-5 border-b border-gray-100">
                <h2 class="text-xl font-bold text-gray-900">&#49345;&#54408; &#44160;&#49353; &#44208;&#44284;</h2>
            </div>
            <div class="p-5 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                <a
                    th:each="product : ${products}"
                    th:href="@{/product/view(id=${product.id})}"
                    href="/product/view?id=1"
                    class="group block rounded-xl overflow-hidden bg-gray-50 border border-gray-200 hover:border-emerald-300 hover:shadow-md transition-all">
                    <div class="aspect-[5/3] overflow-hidden bg-gray-100">
                        <img
                            th:src="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl) ? product.imageUrl : 'https://placehold.co/600x400?text=Product'}"
                            src="https://placehold.co/600x400?text=Product"
                            th:alt="${product.name}"
                            alt="Product"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-gray-900 mb-1" th:text="${product.name}">&#49345;&#54408;&#47749;</h3>
                        <p class="text-sm text-gray-500 mb-2" th:text="${product.description}">&#49345;&#54408; &#49444;&#47749;</p>
                        <span class="font-bold text-emerald-700">
                            <span th:if="${product.price != null}" th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')}">0</span><span th:if="${product.price != null}">&#50896;</span>
                            <span th:if="${product.price == null}">&#44032;&#44201; &#47928;&#51032;</span>
                        </span>
                    </div>
                </a>
            </div>
        </section>

        <div th:if="${products == null or #lists.isEmpty(products)}" class="text-center py-16 px-4">
            <span class="material-symbols-outlined text-5xl text-gray-400 mb-4">search_off</span>
            <p class="text-gray-500 text-lg">&#51068;&#52824;&#54616;&#45716; &#49345;&#54408;&#51060; &#50630;&#49845;&#45768;&#45796;.</p>
            <a class="inline-block mt-8 px-8 py-3 bg-emerald-700 text-white rounded-full font-bold hover:brightness-110 transition-all" th:href="@{/}" href="/">
                &#44228;&#49549; &#49660;&#54609;&#54616;&#44592;
            </a>
        </div>
    </main>
    <script th:src="@{/js/auth.js}" src="/js/auth.js"></script>
</body>
</html>
