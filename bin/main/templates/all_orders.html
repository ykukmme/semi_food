<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 현황 | Heritage Namhae</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/vanilla-utilities.css">
    <link rel="stylesheet" href="/css/all_orders.css">
</head>
<body class="min-h-screen text-on-surface bg-background">
    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-on-surface">주문 현황</h1>
            <p class="mt-2 text-sm text-on-surface-variant">최근 주문 목록과 처리 상태를 확인할 수 있습니다.</p>
        </div>

        <section class="bg-surface rounded-2xl shadow-sm border border-outline-variant overflow-hidden">
            <div class="px-6 py-5 border-b border-outline-variant/20 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                <div>
                    <h2 class="text-lg font-bold text-on-surface">주문 목록</h2>
                    <p class="text-sm text-on-surface-variant mt-1">주문번호, 주문상태, 총가격, 주문일시를 한눈에 볼 수 있습니다.</p>
                </div>
            </div>

            <div th:if="${orders == null or #lists.isEmpty(orders)}" class="min-h-[320px] flex flex-col items-center justify-center text-center px-6 py-14">
                <span class="material-symbols-outlined text-5xl text-outline-variant mb-4" aria-hidden="true">receipt_long</span>
                <h3 class="text-xl font-extrabold text-on-surface">주문 내역이 없습니다.</h3>
                <p class="mt-2 text-sm text-on-surface-variant">마음에 드는 남해 상품을 둘러보고 첫 주문을 시작해보세요.</p>
                <a href="/" class="mt-6 inline-flex items-center justify-center gap-2 rounded-full bg-primary px-6 py-3 text-sm font-extrabold text-white shadow-sm hover:brightness-105 transition">
                    <span class="material-symbols-outlined text-[18px]" aria-hidden="true">storefront</span>
                    쇼핑하기
                </a>
            </div>

            <div th:if="${orders != null and !#lists.isEmpty(orders)}" class="overflow-x-auto">
                <table class="w-full min-w-[860px] text-left border-collapse">
                    <thead class="bg-surface-container-low">
                        <tr>
                            <th class="py-4 px-6 text-[11px] font-bold text-outline-variant uppercase tracking-widest">주문번호</th>
                            <th class="py-4 px-6 text-[11px] font-bold text-outline-variant uppercase tracking-widest">주문상태</th>
                            <th class="py-4 px-6 text-[11px] font-bold text-outline-variant uppercase tracking-widest">총가격</th>
                            <th class="py-4 px-6 text-[11px] font-bold text-outline-variant uppercase tracking-widest">주문일시</th>
                            <th class="py-4 px-6 text-[11px] font-bold text-outline-variant uppercase tracking-widest text-right">관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}" class="border-t border-outline-variant/20">
                            <td class="py-4 px-6 font-bold text-on-surface" th:text="${order.orderNumber}">PO-20260428-0001</td>
                            <td class="py-4 px-6">
                                <span class="inline-flex items-center rounded-full bg-primary-fixed px-3 py-1 text-xs font-extrabold text-primary" th:text="${order.statusLabel}">주문 접수</span>
                            </td>
                            <td class="py-4 px-6 font-bold text-on-surface" th:text="${'₩' + #numbers.formatInteger(order.totalPrice, 0, 'COMMA')}">₩0</td>
                            <td class="py-4 px-6 text-on-surface-variant" th:text="${#temporals.format(order.orderedAt, 'yyyy.MM.dd HH:mm')}">2026.04.28 15:30</td>
                            <td class="py-4 px-6 text-right">
                                <a th:if="${order.cancellable}" th:href="@{/cancel_orders(orderNumber=${order.orderNumber})}" class="inline-flex items-center justify-center rounded-full border border-primary px-4 py-2 text-xs font-extrabold text-primary hover:bg-primary/10 transition">
                                    취소/환불
                                </a>
                                <button th:unless="${order.cancellable}" type="button" disabled class="inline-flex items-center justify-center rounded-full border border-outline-variant px-4 py-2 text-xs font-extrabold text-on-surface-variant opacity-60">
                                    취소/환불
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</body>
</html>
