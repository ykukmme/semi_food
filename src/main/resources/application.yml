spring:
  config:
    # Load local secrets/config for both Gradle bootRun and IDE launches.
    # The .env file is ignored by Git; keep real values out of source control.
    import: optional:file:.env[.properties]

  datasource:
    # TiDB Cloud / MySQL-compatible connection values come from environment config.
    url: ${TIDB_URL}
    username: ${TIDB_USERNAME}
    password: ${TIDB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Flyway owns schema changes; JPA must not create or update tables implicitly.
      ddl-auto: none
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    # 실행 순서를 명확하게 제어하기 위해 FlywayConfig라는 별도의 설정 클래스에서 직접 실행.
    enabled: false  # 기본 flyway설정을 무시하고, FlywayConfig.java파일에서 설정, true로 바꿀경우 오히려 flyway가 2번 실행될 수 있음

    # # 1. 체크섬이 달라도 일단 실행 (가장 중요)
    # validate-on-migrate: false
    # # 2. 로컬에 없는 마이그레이션이 DB에 있어도 무시 (다른 팀원 브랜치 작업 건너뛰기)
    # ignore-missing-migrations: true
    
    # #순서가 뒤섞인 마이그레이션 파일도 실행 허용 (협업 필수) 
    # out-of-order: true
    # #로컬 개발 환경에서만: 체크섬 검증이 빌드를 막지 않게 설정 (주의해서 사용) 
    # # validate-on-migrate: false 
    # #실수로 DB를 직접 고쳤을 때 이력을 맞추기 위해 사용
    # baseline-on-migrate: true

cors:
  # Local browser dev defaults only. Production must override with real origins.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.semi: ${LOG_LEVEL:INFO}
    org.flywaydb: ${FLYWAY_LOG_LEVEL:INFO}

jwt:
  secret: ${JWT_SECRET}
  expiry-seconds: ${JWT_EXPIRY_SECONDS:7200}

jackson:
  serialization:
    # 날짜를 숫자 배열([2026,4,27...])이 아닌 문자열로 출력하게 함
    write-dates-as-timestamps: false

