<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 | Heritage Namhae</title>
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <div class="register-container">

        <div class="register-header">
            <a href="index.html" class="badge">Heritage Namhae</a>
            <h1>마이페이지</h1>
            <p>내 계정 정보</p>
            <p class="login-link" style="margin-top: 12px;"><a href="dashboard.html">대시보드로 돌아가기</a></p>
        </div>

        <div class="profile-section">
            <div class="form-group">
                <label for="memberId">아이디</label>
                <input type="text" id="memberId" value="user123" readonly>
            </div>

            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" value="홍길동" readonly>
            </div>

            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" value="honggildong@example.com" readonly>
            </div>

            <div class="form-group">
                <label for="phone">전화번호</label>
                <input type="tel" id="phone" value="01012345678" readonly>
            </div>
        </div>

        <div class="action-buttons">
            <button type="button" class="btn-edit">정보 수정</button>
            <button type="button" class="btn-logout">로그아웃</button>
        </div>

        <hr class="divider">
        <p class="login-link"><a href="javascript:history.back()">이전 페이지로</a></p>
    </div>
