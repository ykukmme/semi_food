spring:
  config:
    # Load local secrets/config for both Gradle bootRun and IDE launches.
    # The .env file is ignored by Git; keep real values out of source control.
    import: optional:file:.env[.properties]

  # Fix Korean character encoding issues
 

  datasource:
    # TiDB Cloud / MySQL-compatible connection values come from environment config.
    url: ${TIDB_URL}
    username: ${TIDB_USERNAME}
    password: ${TIDB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Flyway owns schema changes; JPA must not create or update tables implicitly.
      ddl-auto: none
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# 실행 순서를 명확하게 제어하기 위해 FlywayConfig라는 별도의 설정 클래스에서 직접 실행.
  flyway:
    enabled: false  # 기본 flyway설정을 무시하고, FlywayConfig.java파일에서 설정, true로 바꿀경우 오히려 flyway가 2번 실행될 수 있음
    
    
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    cache: false # 개발 환경에서는 false, 운영 환경에서는 true
    

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${EMAIL_ADDR}
    password: ${EMAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

cors:
  # Local browser dev defaults only. Production must override with real origins.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}

server:
  port: ${SERVER_PORT:8080}
  # Fix character encoding for requests and responses
  
  tomcat:
    uri-encoding: UTF-8

# Jackson configuration for JSON serialization

jackson:
  default-property-inclusion: NON_NULL
  serialization:
  # 날짜를 숫자 배열([2026,4,27...])이 아닌 문자열로 출력하게 함
    write-dates-as-timestamps: false
    fail-on-empty-beans: false
  deserialization:
    fail-on-unknown-properties: false

logging:
  level:
    com.semi: ${LOG_LEVEL:INFO}
    org.flywaydb: ${FLYWAY_LOG_LEVEL:INFO}

jwt:
  secret: ${JWT_SECRET}
  expiry-seconds: ${JWT_EXPIRY_SECONDS:7200}



#무료티어의 render, aws에서는 크롬브라우저 크롤링을 돌리는 것은 거의 불가능 하다고 함. 보류
