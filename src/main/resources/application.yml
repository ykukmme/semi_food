spring:
  datasource:
    # TiDB Cloud 접속 정보는 환경변수로만 (no hardcoded secrets)
    url: ${TIDB_URL}
    username: ${TIDB_USERNAME}
    password: ${TIDB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none       # Flyway가 스키마 관리 — JPA는 관여하지 않음
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate: true 는 이미 운영 중인 DB에 Flyway를 처음 도입할 때만 일시적으로 사용.
    # 신규 환경에서는 이 옵션이 없어야 V1부터 순차 실행됨 — 활성화 시 V1~V7이 건너뛰어짐.

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}   # 배포 시 실제 도메인으로 설정 필수

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.semi: ${LOG_LEVEL:INFO}

jwt:
  secret: ${JWT_SECRET}
  expiry-seconds: ${JWT_EXPIRY_SECONDS:7200}
