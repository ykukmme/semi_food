<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 — 스마트 식품 이커머스</title>
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <div class="register-container">

        <div class="register-header">
            <span class="badge">스마트 식품 이커머스</span>
            <h1>계정 만들기</h1>
            <p>간편하게 가입하고 서비스를 이용해보세요</p>
        </div>

        <form id="registerForm" novalidate>
            <div class="form-group">
                <label for="memberId">아이디 <span class="required">*</span></label>
                <input type="text" id="memberId" name="memberId"
                       placeholder="영문, 숫자, 밑줄 4~20자"
                       required minlength="4" maxlength="20">
                <span class="error-msg" id="memberIdError"></span>
            </div>

            <div class="form-group">
                <label for="password">비밀번호 <span class="required">*</span></label>
                <input type="password" id="password" name="password"
                       placeholder="8자 이상"
                       required minlength="8">
                <span class="error-msg" id="passwordError"></span>
            </div>

            <div class="form-group">
                <label for="email">이메일 <span class="required">*</span></label>
                <input type="email" id="email" name="email"
                       placeholder="example@email.com"
                       required>
                <span class="error-msg" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="phone">전화번호</label>
                <input type="tel" id="phone" name="phone"
                       placeholder="숫자만 입력 (01012345678)"
                       pattern="[0-9]{10,11}">
                <span class="error-msg" id="phoneError"></span>
            </div>

            <div class="form-group">
                <label for="name">이름 <span class="required">*</span></label>
                <input type="text" id="name" name="name"
                       placeholder="이름을 입력해주세요"
                       required maxlength="50">
                <span class="error-msg" id="nameError"></span>
            </div>

            <div id="globalError" class="global-error hidden"></div>

            <button type="submit" class="btn-submit">가입하기</button>
        </form>

        <hr class="divider">
        <p class="login-link">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
