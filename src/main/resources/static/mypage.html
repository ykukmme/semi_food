<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 | Heritage Namhae</title>
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <div class="register-container">

        <div class="register-header">
            <a href="index.html" class="badge">Heritage Namhae</a>
            <h1>마이페이지</h1>
            <p>내 계정 정보</p>
        </div>

        <div class="profile-section">
            <div class="form-group">
                <label for="memberId">아이디</label>
                <input type="text" id="memberId" value="user123" readonly>
            </div>

            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" value="홍길동" readonly>
            </div>

            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" value="honggildong@example.com" readonly>
            </div>

            <div class="form-group">
                <label for="phone">전화번호</label>
                <input type="tel" id="phone" value="01012345678" readonly>
            </div>
        </div>

        <div class="action-buttons">
            <button type="button" class="btn-edit">정보 수정</button>
            <button type="button" class="btn-logout">로그아웃</button>
        </div>

        <hr class="divider">
        <p class="login-link"><a href="index.html">홈으로 돌아가기</a></p>
    </div>

    <style>
        .profile-section {
            margin-bottom: 24px;
        }
        
        .profile-section input[readonly] {
            background-color: var(--color-bg-warm);
            cursor: not-allowed;
            color: var(--color-text-secondary);
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .btn-edit {
            flex: 1;
            background-color: var(--color-blue);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .btn-edit:hover {
            background-color: var(--color-blue-active);
        }
        
        .btn-logout {
            flex: 1;
            background-color: transparent;
            color: var(--color-text-secondary);
            border: 1px solid var(--color-border);
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-logout:hover {
            background-color: var(--color-bg-warm);
            border-color: var(--color-text-muted);
        }
        
        .login-link {
            text-align: center;
            margin-top: 16px;
        }
        
        .login-link a {
            color: var(--color-blue);
            text-decoration: none;
            font-weight: 500;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/mypage.js"></script>
</body>
</html>
