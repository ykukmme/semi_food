<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaDream Admin - Orders</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>

<body>
    <div class="app">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-badge">DD</div>
                <div>
                    <div class="logo-title">DaDream Admin</div>
                    <div class="logo-sub">RPA Automation System</div>
                </div>
            </div>
            <div class="sidebar-nav">
                <div class="nav-section">MENU</div>
                <div class="nav-item" onclick="location.href='/admin/dashboard'">
                    <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                        stroke-width="1.6">
                        <rect x="1" y="1" width="6" height="6" rx="1.5" />
                        <rect x="9" y="1" width="6" height="6" rx="1.5" />
                        <rect x="1" y="9" width="6" height="6" rx="1.5" />
                        <rect x="9" y="9" width="6" height="6" rx="1.5" />
                    </svg>
                    Dashboard
                </div>
                <div class="nav-item active" onclick="location.href='/admin/orders'">
                    <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                        stroke-width="1.6">
                        <path d="M2 2h2l2 8h6l2-6H6" />
                        <circle cx="8" cy="13" r="1" />
                        <circle cx="12" cy="13" r="1" />
                    </svg>
                    Orders
                </div>
                <div class="nav-item" onclick="location.href='/admin/products'">
                    <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                        stroke-width="1.6">
                        <rect x="2" y="3" width="12" height="10" rx="1" />
                        <path d="M5 3V2M11 3V2M5 8h6M5 11h4" />
                    </svg>
                    Products
                </div>
                <div class="nav-item" onclick="location.href='/admin/members'">
                    <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                        stroke-width="1.6">
                        <circle cx="6" cy="5" r="3" />
                        <path d="M1 14c0-3 2.2-5 5-5s5 2 5 5" />
                        <circle cx="13" cy="6" r="2" />
                        <path d="M13 10c1.5 0 2.5 1 2.5 3" />
                    </svg>
                    Members
                </div>
            </div>
            <div class="sidebar-bottom">
                <div class="sidebar-user">
                    <div class="sidebar-user-av" id="sidebarUserInitial" th:text="${currentAdminInitial}">A</div>
                    <div>
                        <div class="sidebar-user-name" id="sidebarUserName" th:text="${currentAdminName}">Admin</div>
                        <div class="sidebar-user-role" id="sidebarUserEmail" th:text="${currentAdminEmail}">admin@dadream.com</div>
                    </div>
                </div>
                <div class="nav-item" onclick="handleLogout()">Logout</div>
            </div>
        </div>

        <!-- PAGE CONTENT -->
        <div class="page active orders-page">
            <div class="topbar">
                <button class="mobile-menu-toggle" id="mobileMenuToggle">
                  <span></span>
                  <span></span>
                  <span></span>
                </button>
                <div><span class="topbar-title">Orders</span><span class="topbar-breadcrumb">/ Order Management</span>
                </div>
                <span class="live-badge"><span class="live-dot"></span>ACTIVE: <span id="activeCount">0</span></span>
                <span style="font-size:11px;color:#bbb;margin-left:6px">TODAY: <span id="todayCount">0</span></span>
                <div style="flex:1"></div>
                <div style="display:flex;gap:8px;align-items:center">
                    <button class="btn-zoom" onclick="zoomIn()" title="확대">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="8" cy="8" r="6"/>
                            <path d="M8 5v3M8 11v.01M11 11l3 3"/>
                        </svg>
                    </button>
                    <button class="btn-zoom" onclick="zoomOut()" title="축소">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="8" cy="8" r="6"/>
                            <path d="M5 8h6M11 11l3 3"/>
                        </svg>
                    </button>
                    <button class="btn-zoom" onclick="printOrders()" title="프린터 출력">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 1h6a1 1 0 0 1 1 1v2H4V2a1 1 0 0 1 1-1zM4 8h8v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V8zM7 11h2M2 3h12v8H2V3z"/>
                        </svg>
                    </button>
                    <button class="btn-p" onclick="exportOrders()">Excel Export</button>
                </div>
            </div>
            <div class="orders-layout">
                <div class="order-list">
                    <div class="order-list-header">
                        <div class="order-list-title">Order List</div>
                        <div class="order-search">
                            <input placeholder="Search orders..." id="orderSearch">
                        </div>
                    </div>
                    <div class="order-items" id="orderItems">
                        <!-- Orders will be loaded here -->
                    </div>
                </div>
                <div class="invoice-area" id="invoiceArea">
                    <div class="invoice-card" id="emptyInvoice">
                        <div style="text-align:center;padding:60px 20px;color:#ccc">
                            <svg width="48" height="48" viewBox="0 0 16 16" fill="none" stroke="#ccc" stroke-width="1.5"
                                style="margin-bottom:16px">
                                <path d="M2 2h2l2 8h6l2-6H6" />
                                <circle cx="8" cy="13" r="1" />
                                <circle cx="12" cy="13" r="1" />
                            </svg>
                            <div style="font-size:14px;color:#999;margin-bottom:8px">No Order Selected</div>
                            <div style="font-size:12px;color:#bbb">Select an order from the list to view details</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#6ed9a0" stroke-width="2">
                <path d="M2 8l4 4 8-8" />
            </svg>
            <span id="toastMsg"></span>
        </div>

    </div>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>

    <script src="/js/admin.js"></script>

</body>

</html>
