# [ ] TODO 윈도우, 도커(리눅스)를 기준으로 진행


python:
  path: ${PYTHON_PATH:python} # 환경변수가 없으면 기본 python 실행
  script-path: ${PYTHON_SCRIPT_PATH:/path/to/script.py}
  
