# ============================================================
# Nginx 설정 — 스마트 식품 이커머스 플랫폼
# 위치: /etc/nginx/conf.d/semi.conf (Amazon Linux 2/2023)
#
# 역할: 모든 요청을 Spring Boot(8080)로 리버스 프록시
#   - 정적 파일(HTML/CSS/JS): Spring Boot가 static/ 에서 직접 서빙
#   - API 요청 (/api/**): Spring Boot가 처리
#   - Nginx는 SSL 종료 + 프록시 역할만 담당
# ============================================================

# HTTP → HTTPS 리다이렉트 (Let's Encrypt 인증서 발급 후 주석 해제)
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;   # 도메인 없을 때 IP로 접근. 도메인 있으면 실제 도메인으로 교체

    # ── 전체 요청 → Spring Boot 프록시 ─────────────────────
    location / {
        proxy_pass         http://localhost:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 타임아웃 (발주 처리 등 긴 요청 대비)
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # ── 보안 헤더 ────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header X-XSS-Protection        "1; mode=block";

    # ── 접근 로그 ────────────────────────────────────────────
    access_log /var/log/nginx/semi_access.log;
    error_log  /var/log/nginx/semi_error.log;
}

