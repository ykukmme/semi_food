<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DaDream Admin - Products</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>

<body>
  <div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-badge">DD</div>
        <div>
          <div class="logo-title">DaDream Admin</div>
          <div class="logo-sub">RPA Automation System</div>
        </div>
      </div>
      <div class="sidebar-nav">
        <div class="nav-section">MENU</div>
        <div class="nav-item" onclick="location.href='/admin/dashboard'">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="1" y="1" width="6" height="6" rx="1.5" />
            <rect x="9" y="1" width="6" height="6" rx="1.5" />
            <rect x="1" y="9" width="6" height="6" rx="1.5" />
            <rect x="9" y="9" width="6" height="6" rx="1.5" />
          </svg>
          Dashboard
        </div>
        <div class="nav-item" onclick="location.href='/admin/orders'">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M2 2h2l2 8h6l2-6H6" />
            <circle cx="8" cy="13" r="1" />
            <circle cx="12" cy="13" r="1" />
          </svg>
          Orders
        </div>
        <div class="nav-item active" onclick="location.href='/admin/products'">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="2" y="3" width="12" height="10" rx="1" />
            <path d="M5 3V2M11 3V2M5 8h6M5 11h4" />
          </svg>
          Products
        </div>
        <div class="nav-item" onclick="location.href='/admin/members'">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="6" cy="5" r="3" />
            <path d="M1 14c0-3 2.2-5 5-5s5 2 5 5" />
            <circle cx="13" cy="6" r="2" />
            <path d="M13 10c1.5 0 2.5 1 2.5 3" />
          </svg>
          Members
        </div>
      </div>
      <div class="sidebar-bottom">
        <div class="sidebar-user">
          <div class="sidebar-user-av" id="sidebarUserInitial" th:text="${currentAdminInitial}">A</div>
          <div>
            <div class="sidebar-user-name" id="sidebarUserName" th:text="${currentAdminName}">Admin</div>
            <div class="sidebar-user-role" id="sidebarUserEmail" th:text="${currentAdminEmail}">admin@dadream.com</div>
          </div>
        </div>
        <div class="nav-item" onclick="handleLogout()">Logout</div>
      </div>
    </div>

    <!-- PAGE CONTENT -->
    <div class="page active">
      <div class="topbar">
        <div><span class="topbar-title">Products</span><span class="topbar-breadcrumb">/ 자동발주 시스템</span></div>
        <div style="flex:1"></div>
        <input class="search-box" placeholder="Search products..." id="productSearch">
        <div class="avatar" id="topbarUserInitial" th:text="${currentAdminInitial}">A</div>
      </div>
      <div class="content">
        <div class="prod-grid" id="productGrid">
          <!-- Products will be loaded here -->
        </div>
        <div class="pagination-container" id="paginationControls">
          <!-- Pagination controls will be added here -->
        </div>
        <div style="text-align:center;font-size:9.5px;color:#ccc;padding:10px 0">
          © 2026 DaDream RPA MALL. ALL RIGHTS RESERVED. &nbsp;·&nbsp;
          <span style="color:#2d9a5e">RPA System Status: Normal</span>
        </div>
      </div>
    </div>

    <!-- Auto Order Modal -->
    <div class="modal-overlay" id="modal-auto-order">
      <div class="modal-panel">
        <div class="modal-icon info"><svg width="22" height="22" viewBox="0 0 16 16" fill="none" stroke="#1d4ed8"
            stroke-width="1.8">
            <path d="M8 1l2 4 4.5.7-3.3 3.2.8 4.5L8 11.3 4 13.4l.8-4.5L1.5 5.7 6 5z" />
          </svg></div>
        <div class="modal-title">Auto Order Settings</div>
        <div class="modal-sub">Configure auto order for this product.</div>
        <div class="form-row">
          <label class="form-label">Reason</label>
          <select class="form-select" id="auto-order-reason">
            <option value="Auto order enabled by admin">Auto order enabled by admin</option>
            <option value="Auto order disabled by admin">Auto order disabled by admin</option>
            <option value="Product restocked">Product restocked</option>
            <option value="Seasonal demand">Seasonal demand</option>
            <option value="Price optimization">Price optimization</option>
            <option value="Inventory management">Inventory management</option>
          </select>
        </div>
        <div class="modal-actions">
          <button class="btn-s" onclick="closeModal('modal-auto-order')">Cancel</button>
          <button class="btn-p" onclick="confirmAutoOrder()">Confirm</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#6ed9a0" stroke-width="2">
        <path d="M2 8l4 4 8-8" />
      </svg>
      <span id="toastMsg"></span>
    </div>

  </div>

  <script src="/js/admin.js"></script>

</body>
</html>
