# ============================================================
# Nginx 설정 — 스마트 식품 이커머스 플랫폼
# 위치: /etc/nginx/conf.d/semi.conf (Amazon Linux 2/2023)
#
# 역할:
#   - 80 포트: HTTP → HTTPS 리다이렉트 (Certbot 적용 후 활성)
#   - 443 포트: 프론트 정적 파일 서빙 + API 리버스 프록시
# ============================================================

# HTTP → HTTPS 리다이렉트 (Let's Encrypt 인증서 발급 후 주석 해제)
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;   # 도메인 없을 때 IP로 접근. 도메인 있으면 실제 도메인으로 교체

    # 프론트엔드 정적 파일 루트
    root /var/www/semi/frontend;
    index login.html;

    # ── 정적 파일 서빙 ──────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    # ── API 리버스 프록시 ────────────────────────────────────
    # /api/ 로 시작하는 요청은 백엔드(Spring Boot 8080)로 전달
    location /api/ {
        proxy_pass         http://localhost:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 타임아웃 (발주 처리 등 긴 요청 대비)
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ── 보안 헤더 ────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header X-XSS-Protection        "1; mode=block";

    # ── 정적 파일 캐싱 ──────────────────────────────────────
    location ~* \.(css|js|png|jpg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── 접근 로그 ────────────────────────────────────────────
    access_log /var/log/nginx/semi_access.log;
    error_log  /var/log/nginx/semi_error.log;
}

