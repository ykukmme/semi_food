spring:
  datasource:
    # TiDB Cloud 접속 정보는 환경변수로만 (no hardcoded secrets)
    url: ${TIDB_URL}
    username: ${TIDB_USERNAME}
    password: ${TIDB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none       # Flyway가 스키마 관리 — JPA는 관여하지 않음
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # 기존 DB에 Flyway 첫 적용 시 baseline 자동 생성

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}   # 배포 시 실제 도메인으로 설정 필수

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.semi: ${LOG_LEVEL:INFO}

jwt:
  secret: ${JWT_SECRET}
  expiry-seconds: ${JWT_EXPIRY_SECONDS:7200}
