    function titleMatches(query, title) {
        if (!query) return false;
        var t = title;
        var q = query;
        if (t.indexOf(q) !== -1) return true;
        var tl = t.toLowerCase();
        var ql = q.toLowerCase();
        return tl.indexOf(ql) !== -1;
    }

    function runSearch() {
        var params = new URLSearchParams(window.location.search);
        var rawQ = params.get('q');
        var q = rawQ ? String(rawQ).trim() : '';

        var input = document.getElementById('nav-search-input');
        if (input) input.value = rawQ || '';

        var summary = document.getElementById('search-summary');
        var grid = document.getElementById('results-grid');
        var empty = document.getElementById('empty-state');
        var emptyMsg = document.getElementById('empty-message');

        if (!q) {
            summary.textContent = '검색어를 입력해 주세요.';
            grid.innerHTML = '';
            empty.classList.remove('hidden');
            emptyMsg.textContent = '상단 검색창에 상품명을 입력한 뒤 검색해 주세요.';
            return;
        }

        var matched = CATALOG.filter(function (p) {
            return titleMatches(q, p.title);
        });

        summary.innerHTML = '“<strong class="text-on-surface">' + escapeHtml(q) + '</strong>”에 대한 결과 <strong class="text-primary">' + matched.length + '</strong>건';

        if (matched.length === 0) {
            grid.innerHTML = '';
            empty.classList.remove('hidden');
            emptyMsg.textContent = '일치하는 상품이 없습니다. 다른 검색어로 시도해 보세요.';
            return;
        }

        empty.classList.add('hidden');
        grid.innerHTML = matched.map(function (p) {
            return (
                '<a href="' + p.url + '" class="group block rounded-xl overflow-hidden bg-surface-container-lowest border border-outline-variant/10 hover:border-primary/30 hover:shadow-md transition-all">' +
                '<div class="relative aspect-[4/5] overflow-hidden bg-surface-container-low">' +
                '<img src="' + escapeAttr(p.image) + '" alt="' + escapeAttr(p.title) + '" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>' +
                '</div>' +
                '<div class="p-4">' +
                '<h2 class="font-headline font-bold text-lg text-on-surface mb-1">' + escapeHtml(p.title) + '</h2>' +
                '<p class="text-sm text-on-surface-variant mb-3">' + escapeHtml(p.desc) + '</p>' +
                '<span class="font-bold text-primary">' + escapeHtml(p.price) + '</span>' +
                '</div></a>'
            );
        }).join('');
    }

    function escapeHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function escapeAttr(s) {
        return escapeHtml(s).replace(/'/g, '&#39;');
    }

    document.addEventListener('DOMContentLoaded', function () {
        runSearch();

        var form = document.getElementById('nav-search-form');
        if (form) {
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var v = (document.getElementById('nav-search-input').value || '').trim();
                window.location.href = 'search-result.html?q=' + encodeURIComponent(v);
            });
        }
    });
})();
