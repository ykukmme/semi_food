<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div th:if="${#lists.isEmpty(keywords)}">
    <p>등록된 키워드가 없습니다.</p>
</div>
    <!-- <div class="TrendRank" th:each="keyword : ${keywords}"> -->
        <div class="orderBy" th:each="keyword : ${#lists.sort(keywords, idComparator)}">
            <!-- <span th:text="${keyword.id}"></span> -->
            <span th:text="${keyword.rank}"></span>
            <span th:text="${keyword.keyword}"></span>
        </div>
    <!-- </div> -->
</body>
</html>
